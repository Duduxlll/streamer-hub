<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <!-- Diamante principal -->
  <polygon points="30,1 59,30 30,59 1,30"
    fill="none" stroke="rgba(29,78,216,0.13)" stroke-width="0.7"/>
  <!-- Diamante interno -->
  <polygon points="30,14 46,30 30,46 14,30"
    fill="none" stroke="rgba(29,78,216,0.07)" stroke-width="0.5"/>
  <!-- Pontos nos vértices (meia-círculo nas bordas para tile perfeito) -->
  <circle cx="30" cy="0"  r="2.2" fill="rgba(29,78,216,0.20)"/>
  <circle cx="60" cy="30" r="2.2" fill="rgba(29,78,216,0.20)"/>
  <circle cx="30" cy="60" r="2.2" fill="rgba(29,78,216,0.20)"/>
  <circle cx="0"  cy="30" r="2.2" fill="rgba(29,78,216,0.20)"/>
  <!-- Ponto central sutil -->
  <circle cx="30" cy="30" r="1.2" fill="rgba(29,78,216,0.10)"/>
</svg>
