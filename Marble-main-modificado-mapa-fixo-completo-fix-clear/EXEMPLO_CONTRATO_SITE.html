<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contrato Corrida de Bolinhas</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #050a07; color: #ecfff4; font-family: Arial, sans-serif; }
    .page { width: 100vw; height: 100vh; display: grid; grid-template-columns: 340px 1fr; }
    aside { padding: 16px; background: #07130c; border-right: 1px solid rgba(124,255,179,.18); }
    iframe { width: 100%; height: 100%; border: 0; background: #050a07; }
    button { width: 100%; border: 0; border-radius: 12px; padding: 12px; margin: 8px 0; font-weight: 900; cursor: pointer; background: #22e07a; color: #031008; }
    pre { white-space: pre-wrap; color: #7cffb3; }
  </style>
</head>
<body>
  <main class="page">
    <aside>
      <h2>Painel do site</h2>
      <button onclick="carregarJogo()">Carregar corrida com 100 jogadores</button>
      <pre id="result">Aguardando resultado...</pre>
    </aside>

    <iframe id="game" allow="fullscreen; autoplay" allowfullscreen></iframe>
  </main>

  <script>
    const iframe = document.getElementById("game");
    const result = document.getElementById("result");

    function carregarJogo() {
      const jogadores = Array.from({ length: 100 }, (_, i) => `Jogador ${String(i + 1).padStart(3, "0")}`);

      window.CORRIDA_DADOS_JSON = JSON.stringify({
        jogadores,
        topN: 5
      });

      iframe.src = "./index.html?v=" + Date.now();
    }

    window.corridaResultado = function(vencedores) {
      result.textContent = "Vencedores:\n" + vencedores.map((nome, i) => `${i + 1}º ${nome}`).join("\n");
      console.log("Resultado recebido do Godot:", vencedores);
    };

    carregarJogo();
  </script>
</body>
</html>
